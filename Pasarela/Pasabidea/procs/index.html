<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>ARTEZ</title>

    <link href="https://unpkg.com/tabulator-tables@6.2.5/dist/css/tabulator.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100..900&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-red: #d20a11;
            --color-text: #000000;
            --color-text-soft: #666666;
            --color-border: #ebebe6;
            --color-bg: #ffffff;
            --tree-line: #d9d9d3;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: 'Raleway', Arial, sans-serif !important;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .topbar {
            flex: 0 0 auto;
            border-bottom: 1px solid var(--color-border);
            padding: 14px 18px 12px 18px;
        }

            .topbar h2 {
                margin: 0;
                font-size: 24px;
                font-weight: 400;
            }

            .topbar .subtitle {
                margin-top: 4px;
                color: var(--color-red);
                font-size: 13px;
                font-weight: 600;
            }

        #main-table {
            flex: 1;
            overflow: hidden;
        }

        .tabulator-row.proc-selected {
            background: #fff5f5 !important;
        }

            .tabulator-row.proc-selected .tabulator-cell {
                font-weight: 700;
            }

        .expand-btn {
            cursor: pointer;
            color: var(--color-red);
            font-size: 18px;
        }

        .tree-wrapper {
            background: #fff;
            border-bottom: 1px solid var(--color-border);
        }

        .tree-container {
            padding: 10px 16px 14px 56px;
        }

        .tree-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--color-red);
            margin-bottom: 8px;
        }

        .tree-root, .tree-root ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

            .tree-root ul {
                margin-left: 18px;
                padding-left: 18px;
                border-left: 1px solid var(--tree-line);
            }

        .tree-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            cursor: pointer;
        }

            .tree-item:hover {
                border-left: 4px solid var(--color-red);
            }

        .tree-toggle {
            color: var(--color-red);
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <h2>ARTEZ</h2>
        <div class="subtitle">Clasificación de grupos de procedimientos</div>
    </div>

    <div id="main-table"></div>

    <script src="https://unpkg.com/tabulator-tables@6.2.5/dist/js/tabulator.min.js"></script>

    <script>
        let table = null;

        const rootGroup = {
            id: "GP-SIN-CLASIFICAR",
            codigo: "GP-SIN-CLASIFICAR",
            nombre: "Sin clasificar",
            tipo: "Grupo de Procedimientos",
            descripcion: "Diagramas Erwin",
            children: []
        };

        function hasChildren(n) {
            return n.children && n.children.length > 0;
        }

        function mapErwinDiagramToProc(x) {
            return {
                id: x.DI_ID,
                codigo: String(x.DI_ID),
                nombre: x.DI_NAME,
                tipo: "Procedimiento",
                descripcion: `ANO_TABNR=${x.ANO_TABNR}`,
                diId: x.DI_ID,
                diName: x.DI_NAME,
                children: []
            };
        }

        //function loadErwinDiagrams(items) {
        //    rootGroup.children = (items || []).map(mapErwinDiagramToProc);
        //    table.replaceData([rootGroup]);
        //}
        function loadErwinDiagrams(items) {
            rootGroup.children = (items || []).map(mapErwinDiagramToProc);

            if (table) {
                table.replaceData([rootGroup]);
            } else {
                initTable([rootGroup]);
            }
        }


        function notifyProcedureSelected(proc) {
            window.parent.postMessage({
                type: "procedure-selected",
                payload: {
                    diId: proc.diId,
                    diName: proc.diName
                }
            }, "*");
        }

        function renderTreeNode(node) {
            const children = hasChildren(node)
                ? `<ul>${node.children.map(renderTreeNode).join("")}</ul>`
                : "";

            const toggle = hasChildren(node)
                ? `<span class="tree-toggle" onclick="toggleTreeNode(this,event)">＋</span>`
                : "";

            return `
            <li>
                <div class="tree-item" onclick='selectTree(${JSON.stringify(node)})'>
                    ${toggle}
                    ${node.nombre}
                </div>
                ${children}
            </li>
        `;
        }

        window.selectTree = function (n) {
            if (n.tipo === "Procedimiento") notifyProcedureSelected(n);
        };

        window.toggleTreeNode = function (el, ev) {
            if (ev) ev.stopPropagation();
            const ul = el.parentElement.parentElement.querySelector("ul");
            if (!ul) return;

            const hidden = ul.style.display === "none";
            ul.style.display = hidden ? "block" : "none";
            el.textContent = hidden ? "－" : "＋";
        };

        function toggleTreePanel(e, cell) {
            const row = cell.getRow();
            const data = row.getData();
            if (!hasChildren(data)) return;

            const wrapper = document.createElement("div");
            wrapper.className = "tree-wrapper";
            wrapper.innerHTML = `
            <div class="tree-container">
                <div class="tree-title">${data.nombre}</div>
                <ul class="tree-root">
                    ${data.children.map(renderTreeNode).join("")}
                </ul>
            </div>
        `;

            row.getElement().insertAdjacentElement("afterend", wrapper);
        }

        function init() {
            table = new Tabulator("#main-table", {
                data: [rootGroup],
                layout: "fitColumns",
                height: "100%",
                columns: [
                    {
                        formatter: () => `<span class="expand-btn">＋</span>`,
                        width: 40,
                        cellClick: toggleTreePanel
                    },
                    { title: "DI_ID", field: "diId" },
                    { title: "Nombre", field: "nombre" }
                ],
                rowClick: (e, row) => {
                    const d = row.getData();
                    if (d.tipo !== "Procedimiento") return;

                    document.querySelectorAll(".proc-selected")
                        .forEach(x => x.classList.remove("proc-selected"));

                    row.getElement().classList.add("proc-selected");
                    notifyProcedureSelected(d);
                }
            });
        }

        //window.addEventListener("message", e => {
        //    if (e.data?.type === "load-erwin-diagrams") {
        //        loadErwinDiagrams(e.data.payload);
        //    }
        //});

        window.addEventListener("message", function (event) {
            const msg = event.data;
            if (!msg || msg.type !== "load-erwin-diagrams") return;

            loadErwinDiagrams(msg.payload || []);
        });


        init();
    </script>

</body>
</html>
