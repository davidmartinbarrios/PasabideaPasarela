<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visor maestro</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #111827;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            height: 52px;
            min-height: 52px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #1f2937;
            border-bottom: 1px solid #374151;
        }

            .toolbar button {
                border: 0;
                border-radius: 8px;
                padding: 8px 14px;
                font-size: 14px;
                color: #fff;
                background: #374151;
                cursor: pointer;
                transition: background .15s ease;
            }

                .toolbar button:hover {
                    background: #4b5563;
                }

        #split {
            flex: 1;
            display: flex;
            min-height: 0;
            width: 100%;
            height: calc(100% - 52px);
        }

        .pane {
            min-width: 0;
            min-height: 0;
            height: 100%;
            overflow: hidden;
            background: #fff;
        }

            .pane iframe {
                width: 100%;
                height: 100%;
                border: 0;
                display: block;
                background: #fff;
            }

        .gutter {
            background: #d1d5db;
            position: relative;
            flex: 0 0 10px;
            cursor: col-resize;
        }

            .gutter::before {
                content: "";
                position: absolute;
                top: 50%;
                left: 50%;
                width: 4px;
                height: 56px;
                transform: translate(-50%, -50%);
                border-radius: 999px;
                background: #6b7280;
            }

            .gutter:hover {
                background: #cbd5e1;
            }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="btnLeft">Mostrar izda</button>
        <button id="btnCenter">50% cada uno</button>
        <button id="btnRight">Mostrar derecha</button>
    </div>

    <div id="split">
        <div class="pane" id="leftPane">
            <iframe id="iframeBpmn" src="https://app.local/bpmn/index.html" title="BPMN"></iframe>
        </div>

        <div class="pane" id="rightPane">
            <iframe id="iframeMugi" src="https://app.local/mugi/index.html" title="MUGI"></iframe>
        </div>
    </div>

    <script src="https://unpkg.com/split.js/dist/split.min.js"></script>
    <script>
        const split = Split(['#leftPane', '#rightPane'], {
            sizes: [50, 50],
            minSize: [0, 0],
            gutterSize: 10,
            cursor: 'col-resize'
        });

        document.getElementById('btnLeft').addEventListener('click', () => {
            split.setSizes([100, 0]);
        });

        document.getElementById('btnCenter').addEventListener('click', () => {
            split.setSizes([50, 50]);
        });

        document.getElementById('btnRight').addEventListener('click', () => {
            split.setSizes([0, 100]);
        });
    </script>
</body>
</html>
