<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>ARTEZ</title>

    <link href="https://unpkg.com/tabulator-tables@6.2.5/dist/css/tabulator.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100..900&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-red: #d20a11;
            --color-red-dark: #b1080e;
            --color-text: #000000;
            --color-text-soft: #666666;
            --color-border: #ebebe6;
            --color-bg: #ffffff;
            --color-bg-soft: #f8f8f6;
            --color-hover: #fff5f5;
            --tree-line: #d9d9d3;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: 'Raleway', Arial, sans-serif !important;
        }

        body,
        input, textarea, select, button, option,
        label, span, div, p, a, li, ul, ol,
        h1, h2, h3, h4, h5, h6,
        table, thead, tbody, tfoot, tr, th, td,
        small, strong, em, b, i, u,
        pre, code, blockquote,
        svg, text, tspan, foreignObject,
        [class], [id] {
            font-family: 'Raleway', Arial, sans-serif !important;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .topbar {
            flex: 0 0 auto;
            background: var(--color-bg);
            border-bottom: 1px solid var(--color-border);
            padding: 14px 18px 12px 18px;
        }

            .topbar h2 {
                margin: 0;
                font-size: 24px;
                font-weight: 400;
                color: var(--color-text);
                line-height: 1.1;
            }

            .topbar .subtitle {
                margin-top: 4px;
                color: var(--color-red);
                font-size: 13px;
                font-weight: 600;
            }

        #main-table {
            flex: 1 1 auto;
            min-height: 0;
            width: 100%;
            background: var(--color-bg);
            overflow: hidden;
        }

        /* TABULATOR look&feel closer to internal web */
        .tabulator {
            border: none !important;
            background: #fff !important;
            font-size: 13px;
        }

            .tabulator .tabulator-header {
                background: #fff !important;
                border-bottom: 1px solid var(--color-border) !important;
            }

                .tabulator .tabulator-header .tabulator-col {
                    background: #fff !important;
                    color: #000 !important;
                    border-right: 1px solid var(--color-border) !important;
                    font-weight: 700;
                }

                    .tabulator .tabulator-header .tabulator-col:last-child {
                        border-right: none !important;
                    }

        .tabulator-row {
            border-bottom: 1px solid var(--color-border) !important;
            background: #fff !important;
        }

            .tabulator-row:hover {
                background: #fff !important;
            }

            .tabulator-row .tabulator-cell {
                border-right: 1px solid #f2f2ef !important;
                padding: 10px 10px !important;
                vertical-align: middle;
            }

                .tabulator-row .tabulator-cell:last-child {
                    border-right: none !important;
                }

        .tabulator .tabulator-footer {
            border-top: 1px solid var(--color-border) !important;
            background: #fff !important;
        }

        .tabulator input {
            border-radius: 0 !important;
            border: 1px solid #cfcfc8 !important;
            padding: 5px 6px !important;
            background: #fff !important;
        }

            .tabulator input:focus,
            .tabulator input:hover {
                border-color: #000 !important;
                outline: none !important;
            }

        .drag-col {
            cursor: move;
            text-align: center;
            color: var(--color-text-soft);
        }

        .group-label {
            font-weight: 700;
            color: #000;
        }

        .expand-btn {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border: 1px solid transparent;
            color: var(--color-red);
            font-size: 18px;
            line-height: 1;
            user-select: none;
        }

            .expand-btn:hover {
                border-color: var(--color-red);
                background: #fff;
            }

        /* Organic tree container */
        .tree-wrapper {
            background: #fff;
            border-bottom: 1px solid var(--color-border);
        }

        .tree-container {
            padding: 10px 16px 14px 56px;
            background: linear-gradient(to bottom, #fff 0%, #fcfcfb 100%);
        }

        .tree-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .04em;
            color: var(--color-red);
            margin-bottom: 8px;
        }

        .tree-root,
        .tree-root ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

            .tree-root > li {
                margin: 0;
            }

            .tree-root ul {
                margin-left: 18px;
                padding-left: 18px;
                border-left: 1px solid var(--tree-line);
            }

        .tree-node {
            position: relative;
            margin: 2px 0;
        }

            .tree-node::before {
                content: "";
                position: absolute;
                top: 17px;
                left: -18px;
                width: 18px;
                border-top: 1px solid var(--tree-line);
            }

        .tree-root > .tree-node::before {
            display: none;
        }

        .tree-item {
            min-height: 34px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border: 1px solid transparent;
            background: transparent;
            color: #000;
            transition: all .15s ease;
        }

            .tree-item:hover {
                background: #fff;
                border-left: 4px solid var(--color-red);
                padding-left: 4px;
            }

        .tree-toggle {
            width: 18px;
            min-width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--color-red);
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }

            .tree-toggle.empty {
                cursor: default;
                color: transparent;
            }

        .tree-icon {
            width: 18px;
            min-width: 18px;
            text-align: center;
            color: var(--color-red);
            font-size: 13px;
        }

        .tree-text {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tree-code {
            font-size: 11px;
            color: var(--color-text-soft);
            font-weight: 700;
            letter-spacing: .02em;
        }

        .tree-name {
            font-size: 13px;
            color: #000;
            font-weight: 600;
        }

        .tree-type {
            font-size: 11px;
            color: var(--color-text-soft);
        }

        .tree-children.collapsed {
            display: none;
        }

        .row-accent {
            position: relative;
        }

            .row-accent::before {
                content: "";
                position: absolute;
                left: 0;
                top: 6px;
                bottom: 6px;
                width: 4px;
                background: var(--color-red);
            }
    </style>
</head>
<body>
    <div class="topbar">
        <h2>ARTEZ</h2>
        <div class="subtitle">Clasificación de grupos de procedimientos</div>
    </div>

    <div id="main-table"></div>

    <script src="https://unpkg.com/tabulator-tables@6.2.5/dist/js/tabulator.min.js"></script>
    <script>
        const data = [
            {
                id: 1,
                codigo: "GP-EMON",
                nombre: "GP EMON",
                tipo: "Grupo de Procedimientos",
                descripcion: "Grupo principal EMON",
                children: []
            },
            {
                id: 2,
                codigo: "GP-ARTEZ",
                nombre: "GP ARTEZ",
                tipo: "Grupo de Procedimientos",
                descripcion: "Grupo principal ARTEZ",
                children: [
                    {
                        id: 21,
                        codigo: "GP-HACIENDA",
                        nombre: "GP Hacienda",
                        tipo: "Subgrupo",
                        descripcion: "Procedimientos de Hacienda",
                        children: [
                            {
                                id: 211,
                                codigo: "PA????????041",
                                nombre: "PA???????? 041",
                                tipo: "Procedimiento",
                                descripcion: "Procedimiento 041",
                                children: []
                            }
                        ]
                    },
                    {
                        id: 22,
                        codigo: "GP-NO-HACIENDA",
                        nombre: "GP No Hacienda",
                        tipo: "Subgrupo",
                        descripcion: "Procedimientos no Hacienda",
                        children: [
                            {
                                id: 221,
                                codigo: "PA????????030",
                                nombre: "PA???????? 030",
                                tipo: "Procedimiento",
                                descripcion: "Procedimiento 030",
                                children: []
                            }
                        ]
                    }
                ]
            },
            {
                id: 3,
                codigo: "GP-COMUNES",
                nombre: "GP Comunes",
                tipo: "Grupo de Procedimientos",
                descripcion: "Bloques comunes reutilizables",
                children: [
                    {
                        id: 31,
                        codigo: "BLQ-NOTIFICACION",
                        nombre: "Bloque de Notificación",
                        tipo: "Bloque",
                        descripcion: "Bloque común de notificación",
                        children: []
                    },
                    {
                        id: 32,
                        codigo: "BLQ-FIRMA",
                        nombre: "Bloque de Firma",
                        tipo: "Bloque",
                        descripcion: "Bloque común de firma",
                        children: []
                    }
                ]
            }
        ];

        function hasChildren(node) {
            return Array.isArray(node.children) && node.children.length > 0;
        }

        function getNodeIcon(tipo) {
            switch ((tipo || "").toLowerCase()) {
                case "grupo de procedimientos":
                    return "■";
                case "subgrupo":
                    return "▣";
                case "procedimiento":
                    return "●";
                case "bloque":
                    return "◆";
                default:
                    return "•";
            }
        }

        function renderTreeNode(node) {
            const childrenHtml = hasChildren(node)
                ? `<ul class="tree-children collapsed">${node.children.map(renderTreeNode).join("")}</ul>`
                : "";

            const toggle = hasChildren(node)
                ? `<span class="tree-toggle" onclick="toggleTreeNode(this)">＋</span>`
                : `<span class="tree-toggle empty">·</span>`;

            return `
                        <li class="tree-node">
                            <div class="tree-item">
                                ${toggle}
                                <span class="tree-icon">${getNodeIcon(node.tipo)}</span>
                                <span class="tree-text">
                                    <span class="tree-code">${node.codigo || ""}</span>
                                    <span class="tree-name">${node.nombre || ""}</span>
                                    <span class="tree-type">${node.tipo || ""}</span>
                                </span>
                            </div>
                            ${childrenHtml}
                        </li>
                    `;
        }

        window.toggleTreeNode = function (el) {
            const li = el.closest(".tree-node");
            const children = li.querySelector(":scope > .tree-children");
            if (!children) return;

            const collapsed = children.classList.contains("collapsed");
            children.classList.toggle("collapsed");
            el.textContent = collapsed ? "－" : "＋";
        };

        function toggleTreePanel(e, cell) {
            const row = cell.getRow();
            const rowData = row.getData();

            if (!hasChildren(rowData)) return;

            const rowEl = row.getElement();
            const existing = rowEl.nextElementSibling;

            if (existing && existing.classList.contains("tree-wrapper")) {
                existing.remove();
                cell.getElement().innerHTML = `<span class="expand-btn">＋</span>`;
                return;
            }

            const wrapper = document.createElement("div");
            wrapper.className = "tree-wrapper";

            const holder = document.createElement("div");
            holder.className = "tree-container";
            holder.innerHTML = `
                        <div class="tree-title">Estructura de ${rowData.nombre}</div>
                        <ul class="tree-root">
                            ${rowData.children.map(renderTreeNode).join("")}
                        </ul>
                    `;

            wrapper.appendChild(holder);
            rowEl.insertAdjacentElement("afterend", wrapper);

            cell.getElement().innerHTML = `<span class="expand-btn">－</span>`;
        }

        const table = new Tabulator("#main-table", {
            data,
            height: "100%",
            layout: "fitColumns",
            reactiveData: true,
            movableRows: true,
            columns: [
                {
                    title: "",
                    field: "expand",
                    width: 52,
                    hozAlign: "center",
                    headerSort: false,
                    formatter: function (cell) {
                        const row = cell.getRow().getData();
                        return hasChildren(row) ? `<span class="expand-btn">＋</span>` : "";
                    },
                    cellClick: toggleTreePanel
                },
                {
                    rowHandle: true,
                    formatter: "handle",
                    width: 44,
                    hozAlign: "center",
                    headerSort: false,
                    cssClass: "drag-col"
                },
                { title: "Id", field: "id", width: 80, headerFilter: "input" },
                { title: "Código", field: "codigo", width: 170, headerFilter: "input" },
                {
                    title: "Nombre",
                    field: "nombre",
                    widthGrow: 2,
                    headerFilter: "input",
                    formatter: function (cell) {
                        return `<span class="group-label">${cell.getValue() || ""}</span>`;
                    }
                },
                { title: "Tipo", field: "tipo", width: 220, headerFilter: "input" },
                { title: "Descripción", field: "descripcion", widthGrow: 2, headerFilter: "input" }
            ],
            rowFormatter: function (row) {
                const data = row.getData();
                const el = row.getElement();
                el.classList.remove("row-accent");
                if (data.tipo === "Grupo de Procedimientos") {
                    el.classList.add("row-accent");
                }
            },
            movableRowsStopped: function () {
                console.log("Nuevo orden raíz:", table.getData());
            }
        });
    </script>
</body>
</html>
